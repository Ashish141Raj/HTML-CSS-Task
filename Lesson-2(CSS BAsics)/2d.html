<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Buttons</title>
    <style>
        .Get{
            background-color: rgb(121, 82, 179);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bolder;
            font-size: 14px;
            width: 110px;
            height: 36px;
            cursor: pointer;
        }
        .Get:hover{
            opacity: 0.9;
        }
        .Get:active{
            opacity: 0.5;
        }
        .Download{
            background-color: white;
            color: rgb(93, 106, 120);
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px;
            border-style: solid;
            border-width: 2px;
            border-color: rgb(158, 161, 163);;
            width: 110px;
            height: 36px;
            margin-left: 6px;
            cursor: pointer;
            transition: background 0.15;
        }
        .Download:hover{
            background:rgb(126, 131, 131);
            color: rgb(255, 253, 253);
        }
        .Download:active{
            opacity: 0.7;
        }

    </style>
</head>
<body>
    <button class="Get">Get started</button>
    <button class="Download">Download</button>
</body>
</html>

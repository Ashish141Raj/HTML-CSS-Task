<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Buttons</title>
    <style>
        .apply-btn{
            background-color: rgb(10, 102, 194);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
            font-size: 15px;
            border: none;
            border-radius: 40px;
            height: 40px;
            width: 242px;
            cursor: pointer;
            transition: background-color 1s;
        }
          .apply-btn:hover{
            background-color: rgba(4, 56, 108, 0.85);
        }
        .apply-btn:active{
            opacity: 0.7;
        }
        .save-btn{
            background-color: #fff;
            color: rgb(10, 102, 194);
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
            font-size: 20px;
            border-style: solid;
            border-width: 2px;
            border-color: rgb(41, 118, 211);
            border-radius: 18px;
            height: 40px;
            width: 80px;
            margin-left: 10px;
            cursor: pointer;
        }
        .save-btn:hover{
            border-width:  3px;
            background-color: rgba(10, 102, 194,0.15);
        }
        .save-btn:active{
            opacity: 0.7;
        }
      
    </style>
</head>
<body>
    <button class="apply-btn">Apply on company website</button>
    <button class="save-btn">Save</button>
</body>
</html>

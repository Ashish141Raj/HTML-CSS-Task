<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Popup</title>
    <style>
        a{
            color: rgb(0,113,133);
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 19px;
            font-weight: bolder;
            transition: color 0.75s;
        }
        a:hover{
            color: coral;
        }
        h2{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 26px;
            font-weight: bolder;
        }
        h3{
            color: rgb(0,118,0);
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-weight: bold;
            font-size: 20px;
        }
        p{
            font-weight: 900;
            font-style: normal;
            font-size: large;
        }
        .cart-btn{
            background-color: rgb(255,216,20);
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 15px;
            height: 30px;
            width: 120px;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .cart-btn:hover{
            opacity: 0.8;
        }
        .cart-btn:active{
            opacity: 0.5;
        }
        .buy-btn{
            background-color: rgb(255,164,28);
             border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 15px;
            height: 30px;
            width: 120px;
            cursor: pointer;
            margin-left: 20px;
            transition: background-color 0.15s,
            opacity 0.15s;
        
        }
        .buy-btn:hover{
            background-color: rgba(253, 154, 5, 0.76);
        }
        .buy-btn:active{
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <a href="https://www.Amazon.com">Back to Amazon</a>
    <h2>Nike Black Running Shoes</h2>
    <h3>$39 - in stock</h3>
    <p>Free delivery tomorrow.</p>
    <button class="cart-btn">Add to Cart</button>
    <button class="buy-btn">Buy now</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Button</title>
    <style>
        button{
            background-color: rgb(255, 216, 20);
            color: black;
            font-weight: bold;
            font-size: 20px;
            border: none;
            height: 40px;
            width: 220px;
            border-radius: 100px;
        }

            background-color: rgba(255, 216, 20,0.8);;
        }
    </style>
</head>
<body>
    <button>Add to Cart</button>
</body>
</html>

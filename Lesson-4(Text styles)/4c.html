<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdana-Font</title>
    <style>
        p{
            font-family: Verdana;
            margin-top: 0;
            margin-bottom: 0;
        }
        .p1{
            font-weight: bold;
            font-size: large;
            margin-bottom: 5px;
        }
        .p2{
            color: rgb(146, 145, 145);
            margin-bottom: 20px;
        }
        .p3{
           font-size: 14px;
           width: 280px;
           font-weight: 540;
           margin-bottom: 20px;
        }
        button{
            background-color: rgb(18, 131, 28);
            color: white;
            border: none;
            border-radius: 5px;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 25px;
            padding-right: 25px;
            font-size: 10px;
            font-weight: bold;
            transition: background-color 1s;

        }
        button:hover{
            background-color: #2c2929;
        }
        button:active{
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <p class="p1">HTML CSS Course</p>
    <p class="p2">Beginner to Pro</p>
    <p class="p3">In this Course, We'll learn the skills you need to become a developer.</p>
    <button>Get Started</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arial-Font</title>
    <style>
        body{
            font-family: Arial;
        }
        .p1{
            font-weight: bolder;
            font-size: 30px;
            margin: 0;
        }
        .p2{
            color:rgb(229, 66, 66);
            font-style: italic;
            font-weight: 500;
            font-size: medium;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <p class="p1">Biggest Deals of the Year!</p>
    <p class="p2">Sales end Tuesday</p>
</body>
</html>

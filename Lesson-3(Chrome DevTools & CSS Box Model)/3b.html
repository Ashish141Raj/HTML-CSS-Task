<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagination</title>
    <style>
        .back-btn{
            padding: 10px 16px;
            color:rgb(138, 137, 137);
            font-weight: bold;        
        }
        a{
            color:rgb(138, 137, 137)
        }
        .next-btn{
            padding: 10px 16px;
            color:rgb(138, 137, 137);
            font-weight: bold;        
        }
    </style>
</head>
<body>
   <button class="back-btn">Back</button>
   <a href="#">1</a>
   <a href="#">2</a>
   <a href="#">3</a>
   <a href="#">4</a> 
   <a href="#">5</a>
   <button class="next-btn">Next</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin and padding togather</title>
    <style>
        button{
            background-color: rgb(12, 173, 50);
            color: whitesmoke;
            border: none;
            font-weight: bold;
            padding: 10px 16px;   
            margin: 10px;         
            cursor: pointer;
            display: inline-block;
            transition: padding 0.2s;
        }
        button:hover{
            padding: 26px 26px;
        }
  
    </style>
</head>
<body>
    <button class="one">One</button>
    <button class="two">Two</button>
    <button class="three">Three</button>
</body>
</html>

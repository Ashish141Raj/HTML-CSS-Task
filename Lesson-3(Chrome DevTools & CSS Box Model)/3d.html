<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Click Button</title>
    <style>
        button{
            background-color: rgb(6, 125, 28);
            color: whitesmoke;
            border: none;
            padding: 10px 16px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.1s; 
        }
        button:hover{
            transform: translateX(-2px);
            box-shadow: 0 2px 5px rgb(105, 107, 105);
        }
        button:active{
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgb(4, 90, 20);
        }
    </style>
</head>
<body>
    <button>Shadow</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBSCRIBE - JOIN - TWEET</title>
    <style>
        .subscribe-btn{
            background-color: rgb(184, 12, 12);
            color: white;
            border: none;
            border-radius: 2px;
            font-weight: bold;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 16px;
            padding-right: 16px;
            cursor: pointer;
            transition: background-color 0.15s,opacity 0.15s;
        }
        .subscribe-btn:hover{
            opacity: 0.9;
            background-color: rgb(150, 10, 10);
        }
        .subscribe-btn:active{
            opacity: 0.5;
        }
        .join-btn{
            background-color: white;
            color:rgb(48, 94, 180);
            border-color:rgb(48, 94, 180);
            border-width: 1px;
            border-radius: 3px;
            border-style: solid;
            padding-top: 9px;
            padding-left: 16px;
            padding-bottom: 9px;
            padding-right: 16px;
            font-weight: bold;
            font-size: 15px;
            margin: 10px;
            cursor: pointer;
            transition: background-color 0.15s,
            color 0.15s;
        }
        .join-btn:hover{
            background-color: rgb(48, 94, 180);
            color: whitesmoke;
        }
        .join-btn:active{
            opacity: 0.7;
        }
        .tweet-btn{
            background-color:rgb(48, 94, 180);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 16px;
            padding-left: 16px;
            cursor: pointer;
            transition: box-shadow 0.15s,
            opacity 0.15s;
        }
        .tweet-btn:hover{
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .tweet-btn:active{
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <button class="subscribe-btn">SUBSCRIBE</button>
    <button class="join-btn">JOIN ME</button>
    <button class="tweet-btn">TWEET ME</button>
</body>
</html>

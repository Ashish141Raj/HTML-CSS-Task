<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Sign up form</title>
        <style>
            .first-name , .last-name{
                width: 148px;
                border-width: 1px;
                border-style: solid;
                border-color: rgb(200, 200, 200);
                padding-top: 12px;
                padding-bottom: 12px;
                padding-left: 16px;
                padding-right: 16px;
                font-size: 16px;
                border-radius: 8px;
                margin-bottom: 12px;
                box-shadow: 0 1px 5px rgba(0, 0, 0, 0.25);
            }
            .email{
                width: 335px;
                border-width: 1px;
                border-style: solid;
                border-color: rgb(200, 200, 200);
                padding-top: 12px;
                padding-bottom: 12px;
                padding-left: 16px;
                padding-right: 16px;
                font-size: 16px;
                border-radius: 8px;
                margin-bottom: 12px;
                box-shadow: 0 1px 5px rgba(0, 0, 0, 0.25);
                display: block;
            }
            button{
               background-color: rgb(47, 27, 231); 
               color: white;
               border: none;
               border-radius: 50px;
               padding-top: 14px;
               padding-bottom: 14px;
               font-size: 18px;
               font-weight: bold;
               width:370px;
               transition: background-color 1s;
            }
            button:hover{
                background-color:rgb(30, 38, 149);
                color:aliceblue;
            }
            button:active{
                opacity: 0.8;
            }
        </style>
    </head>
    <body>
        <input type="text" placeholder="first name" class="first-name">
        <input type="text" placeholder="last name" class="last-name">
        <input type="text" placeholder="Email" class="email">
        <button>Sign Up</button>
    </body>
</html>

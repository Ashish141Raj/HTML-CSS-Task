<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Text Box</title>
    <style>
        img{
          width: 50px;
          height: 50px;
          border-radius: 25px;
          object-fit: cover;
          vertical-align: middle;
          margin-left: 30px;
        }
        input{
            font-size: 18px;
            border: none;
            color: rgb(100, 100, 100);
            width: 300px;
            vertical-align: middle;
            margin-left: 15px;
        }
        button{
            background-color: rgb(29, 155, 240);
            color: white;
            border: none;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 16px;
            padding-right: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <img src="cat.jpg" alt="billi">
    <input type="text" placeholder="What's happeining?">
    <button>Tweet</button>
</body>
</html>

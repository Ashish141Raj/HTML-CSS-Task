<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkedin signup</title>
    <style>
        label{
            color: rgb(100, 100,100);
            font-family: arial;
            margin-top: 50px;
        }
        .text-box{
            font-size: 24px;
            width: 400px;
            border-width: 2px;
            border-style: solid;
            border-radius: 5px;
            border-color: rgb(100, 100, 100);
            margin-top: 8px;
            margin-bottom: 20px;

        }
        p{
            color: rgb(113, 111, 111);
            font-family: arial;
            font-size: 15px;


        }
        button {
        background-color: rgb(10, 102, 194);
        color: white;
        border: none;
        font-size: 20px;
        width: 400px;
        padding-top: 16px;
        padding-bottom: 16px;
        border-radius: 30px;
        }
    </style>
</head>
<body>
    <label for="email">Email</label><br>
    <input type="text" class="text-box">

    <p> By clicking Agree & Join, you agree to the Privacy Policy.</p>
    <button>
        Agree & Join
    </button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textbox with rounded corners</title>
    <style>
        input{
            font-size: 25px;
            border-color: rgb(200, 200, 200);
            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 15px;
            padding-right: 15px;
            border-width: 1px;
            border-style: solid;
            border-radius: 8px;
        }
    </style>
    
</head>
<body>
    <input type="text" placeholder="Search">
</body>
</html>
